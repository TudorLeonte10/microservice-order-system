services:
  order-service:
    build:
      context: ./order
      dockerfile: OrderService.API/Dockerfile
    container_name: order-service
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=OrderDb;User Id=sa;Password=${ORDER_DB_PASS};TrustServerCertificate=true;
      - InventoryService__BaseUrl=http://inventory-service:8080
      - PaymentService__BaseUrl=http://payment-service:8080
    depends_on:
      - sqlserver
    networks:
      - microserv-network
    restart: 
      unless-stopped

  inventory-service:
    build:
      context: ./inventory
      dockerfile: InventoryService.API/Dockerfile
    container_name: inventory-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=InventoryDb;User Id=sa;Password=${INVENTORY_DB_PASS};TrustServerCertificate=true;
    depends_on:
      - sqlserver
    networks:
      - microserv-network
    restart: 
      unless-stopped

  payment-service:
    build:
      context: ./payment
      dockerfile: PaymentService.API/Dockerfile
    container_name: payment-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=PaymentDb;User Id=sa;Password=${PAYMENT_DB_PASS};TrustServerCertificate=true;
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - OrderService__BaseUrl=http://order-service:8080
    depends_on:
      - sqlserver
    networks:
      - microserv-network
    restart: 
      unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microserv-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SQLSERVER_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - microserv_sqlserver_data:/var/opt/mssql
    networks:
      - microserv-network
    restart: 
      unless-stopped

volumes:
  microserv_sqlserver_data:
    driver: local

networks:
  microserv-network:
    driver: bridge